<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    color: #e8e0d0;
    font-family: 'Crimson Text', serif;
    min-height: 100vh;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(80,20,20,0.3) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(40,10,60,0.3) 0%, transparent 60%);
  }
  .quiz-container { max-width: 720px; margin: 0 auto; }
  .header { text-align: center; padding: 24px 0 20px; border-bottom: 1px solid rgba(180,140,60,0.3); margin-bottom: 24px; }
  .header h1 { font-family: 'Cinzel', serif; font-size: 1.8em; color: #c8a84b; letter-spacing: 4px; text-shadow: 0 0 30px rgba(200,168,75,0.4); }
  .header p { font-size: 1em; color: rgba(232,224,208,0.5); margin-top: 6px; font-style: italic; }
  .progress-bar-container { background: rgba(255,255,255,0.05); border-radius: 20px; height: 6px; margin-bottom: 8px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #8b2020, #c8a84b); border-radius: 20px; transition: width 0.5s ease; }
  .progress-text { font-family: 'Cinzel', serif; font-size: 0.75em; color: rgba(200,168,75,0.7); text-align: right; margin-bottom: 20px; letter-spacing: 1px; }
  .section-badge { display: inline-block; background: rgba(139,32,32,0.3); border: 1px solid rgba(139,32,32,0.6); color: #e8a0a0; font-family: 'Cinzel', serif; font-size: 0.65em; letter-spacing: 2px; padding: 4px 12px; border-radius: 20px; margin-bottom: 16px; text-transform: uppercase; }
  .question-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(200,168,75,0.15); border-radius: 12px; padding: 28px; margin-bottom: 20px; position: relative; overflow: hidden; }
  .question-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, rgba(200,168,75,0.4), transparent); }
  .question-num { font-family: 'Cinzel', serif; font-size: 0.7em; color: rgba(200,168,75,0.5); letter-spacing: 2px; margin-bottom: 10px; }
  .question-text { font-size: 1.15em; line-height: 1.6; color: #e8e0d0; margin-bottom: 20px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px 16px; color: #c8c0b0; font-family: 'Crimson Text', serif; font-size: 1em; text-align: left; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: flex-start; gap: 12px; }
  .option-btn:hover:not(:disabled) { background: rgba(200,168,75,0.08); border-color: rgba(200,168,75,0.4); color: #e8e0d0; transform: translateX(3px); }
  .option-letter { font-family: 'Cinzel', serif; font-size: 0.8em; color: rgba(200,168,75,0.6); min-width: 20px; margin-top: 2px; }
  .option-btn.correct { background: rgba(40,120,60,0.2); border-color: rgba(60,180,90,0.5); color: #a0e8b0; }
  .option-btn.wrong { background: rgba(120,30,30,0.2); border-color: rgba(180,60,60,0.5); color: #e8a0a0; }
  .option-btn.reveal { background: rgba(40,120,60,0.1); border-color: rgba(60,180,90,0.3); color: rgba(160,232,176,0.7); }
  .option-btn:disabled { cursor: default; }
  .feedback { margin-top: 16px; padding: 14px 16px; border-radius: 8px; font-size: 1em; line-height: 1.6; display: none; }
  .feedback.correct { background: rgba(40,120,60,0.15); border: 1px solid rgba(60,180,90,0.3); color: #a0e8b0; display: block; }
  .feedback.wrong { background: rgba(120,30,30,0.15); border: 1px solid rgba(180,60,60,0.3); color: #f0b0b0; display: block; }
  .feedback strong { font-family: 'Cinzel', serif; font-size: 0.85em; letter-spacing: 1px; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 12px; }
  .nav-btn { background: transparent; border: 1px solid rgba(200,168,75,0.4); color: #c8a84b; font-family: 'Cinzel', serif; font-size: 0.75em; letter-spacing: 2px; padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .nav-btn:hover { background: rgba(200,168,75,0.1); border-color: #c8a84b; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .score-display { font-family: 'Cinzel', serif; font-size: 0.8em; color: rgba(200,168,75,0.6); letter-spacing: 1px; }
  .results-card { text-align: center; padding: 40px 30px; background: rgba(255,255,255,0.03); border: 1px solid rgba(200,168,75,0.2); border-radius: 12px; }
  .results-score { font-family: 'Cinzel', serif; font-size: 4em; color: #c8a84b; text-shadow: 0 0 40px rgba(200,168,75,0.5); margin: 16px 0; }
  .results-msg { font-size: 1.2em; font-style: italic; color: rgba(232,224,208,0.7); margin-bottom: 24px; }
  .restart-btn { background: rgba(200,168,75,0.1); border: 1px solid #c8a84b; color: #c8a84b; font-family: 'Cinzel', serif; font-size: 0.8em; letter-spacing: 2px; padding: 12px 28px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .restart-btn:hover { background: rgba(200,168,75,0.2); }
  .category-select { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; justify-content: center; }
  .cat-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(200,168,75,0.2); color: rgba(200,168,75,0.7); font-family: 'Cinzel', serif; font-size: 0.65em; letter-spacing: 1px; padding: 7px 14px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
  .cat-btn:hover { background: rgba(200,168,75,0.15); border-color: #c8a84b; color: #c8a84b; }
  .intro-text { text-align:center; font-style:italic; color:rgba(232,224,208,0.6); margin-bottom:16px; font-size:1.05em; }
</style>

<div class="quiz-container">
  <div class="header">
    <h1>⚔ MACBETH QUIZ ⚔</h1>

  <div id="quiz-screen" style="display:none;">

<script>
const allQuestions = {
  plot: [
    { section:"ACT 1", q:"In Act 1, Scene 1, what do the Three Witches plan to do when they next meet?", options:["Curse King Duncan's army","Meet with Macbeth upon the heath","Summon Hecate for guidance","Cast a spell on Banquo"], answer:1, explanation:"The Witches plan to meet Macbeth 'upon the heath' after the battle — setting up the central prophecy that drives the entire play." },
    { section:"ACT 1", q:"In Act 1, Scene 2, how is Macbeth initially characterized in the eyes of King Duncan?", options:["As a treacherous, untrustworthy thane","As a brave, valiant hero worthy of great reward","As an ambitious soldier who desires the throne","As a loyal but unremarkable soldier"], answer:1, explanation:"Duncan calls Macbeth 'valiant cousin, worthy gentleman' and rewards him with the title Thane of Cawdor — making the later betrayal deeply ironic." },
    { section:"ACT 1", q:"What THREE things do the Witches prophesy for Macbeth in Act 1, Scene 3?", options:["Thane of Glamis, Thane of Cawdor, and King hereafter","King of Scotland, Lord of England, and ruler of Ireland","Thane of Cawdor, Thane of Ross, and future emperor","General of the army, Thane of Glamis, and King hereafter"], answer:0, explanation:"The Witches hail Macbeth as Thane of Glamis (already true), Thane of Cawdor (just granted), and 'King hereafter' — the prophecy that plants the seed of ambition." },
    { section:"ACT 1", q:"In Act 1, Scene 5, what is Lady Macbeth's concern about her husband after reading his letter?", options:["That he is too cowardly to fight in battle","That he is too full of 'the milk of human kindness' to seize the crown","That he will tell Duncan about the prophecy","That he does not love her enough to share power"], answer:1, explanation:"Lady Macbeth fears Macbeth is too kind-hearted. This motivates her to 'unsex' herself and take control of the plan to murder Duncan." },
    { section:"ACT 1", q:"In Act 1, Scene 7, which of the following is NOT a reason Macbeth gives for NOT killing Duncan?", options:["Duncan is his kinsman and king","He is Duncan's host and should protect him","Macbeth fears the witches are lying to him","Duncan has been a virtuous, meek ruler"], answer:2, explanation:"Macbeth's hesitation is about loyalty, hospitality, and Duncan's goodness — not doubt about the witches. Lady Macbeth uses guilt and manipulation to override his hesitation." },
    { section:"ACT 2", q:"What does Macbeth imagine seeing as he walks toward Duncan's chamber in Act 2, Scene 1?", options:["The ghost of King Duncan","A floating dagger pointing toward the king's room","Three witches dancing around a fire","His own shadow transformed into a monster"], answer:1, explanation:"Macbeth hallucinates a dagger — 'Is this a dagger which I see before me?' This signals his psychological unraveling and illustrates how guilt and ambition distort his mind." },
    { section:"ACT 2", q:"After murdering Duncan, Macbeth is unable to do what?", options:["Return to his own chamber","Say 'Amen' after hearing someone pray","Look at Duncan's body","Wash the blood from his hands"], answer:1, explanation:"Macbeth heard the grooms say 'God bless us' and was unable to say 'Amen.' This inability to pray represents how deeply he has separated himself from grace." },
    { section:"ACT 2", q:"In Act 2, Scene 3, what reason does Macbeth give for killing the king's servants?", options:["He claims they were trying to flee","He says grief and rage overtook him at seeing Duncan's body","He accuses them of being witches in disguise","He claims Lady Macbeth ordered him to"], answer:1, explanation:"Macbeth claims overwhelming grief drove him. In truth, he kills them to eliminate the only witnesses — a calculated move, not an emotional one." },
    { section:"ACT 2", q:"Who flees Scotland after Duncan's murder, and where do they go?", options:["Malcolm to England; Donalbain to Ireland","Macduff to England; Ross to France","Banquo to Ireland; Malcolm to England","Donalbain to England; Malcolm to France"], answer:0, explanation:"Malcolm goes to England and Donalbain to Ireland. Their flight is used as 'evidence' of guilt by Macbeth and others." },
    { section:"ACT 3", q:"Why does Macbeth want Banquo murdered in Act 3, Scene 1?", options:["Banquo saw Macbeth kill Duncan","The witches prophesied Banquo's sons would be kings, threatening Macbeth's dynasty","Banquo refused to support Macbeth's kingship","Lady Macbeth convinced Macbeth that Banquo was dangerous"], answer:1, explanation:"Macbeth fears Banquo's prophecy — that his sons will inherit the throne — meaning Macbeth's crimes would only serve Banquo's lineage, not his own." },
    { section:"ACT 3", q:"At the banquet in Act 3, Scene 4, where does Banquo's ghost appear?", options:["In the doorway behind Lady Macbeth","At Macbeth's seat at the dinner table","Outside the castle window","Standing over Macbeth's shoulder"], answer:1, explanation:"The ghost sits in Macbeth's place — a symbol of how Macbeth's crimes are literally displacing him. Only Macbeth can see it, making him look unhinged to his guests." },
    { section:"ACT 4", q:"What are the THREE apparitions the Witches show Macbeth in Act 4, Scene 1?", options:["An armed head; a bloody child; a crowned child holding a tree","A ghost of Duncan; three bloody daggers; a crown","A black cat; a floating dagger; a burning crown","Banquo's ghost; a weeping woman; a dying king"], answer:0, explanation:"The armed head warns of Macduff; the bloody child says no man of woman born can harm Macbeth; the crowned child says he's safe until Birnam Wood moves. Each gives false confidence." },
    { section:"ACT 4", q:"What happens to Lady Macduff and her children in Act 4, Scene 2?", options:["They escape to England to join Macduff","They are murdered by Macbeth's assassins","They are imprisoned in Macbeth's castle","Lady Macduff is imprisoned but the children escape"], answer:1, explanation:"Macbeth orders the slaughter of all of Macduff's family. This act marks Macbeth's full moral collapse and galvanizes Macduff's revenge." },
    { section:"ACT 5", q:"What does Lady Macbeth do in Act 5, Scene 1 that reveals her psychological collapse?", options:["She confesses to Duncan's murder in front of the court","She sleepwalks and compulsively tries to wash imaginary blood from her hands","She begs Macbeth to flee Scotland with her","She visits the Three Witches for guidance"], answer:1, explanation:"Lady Macbeth's sleepwalking and obsessive hand-washing ('Out, damned spot!') mirrors her earlier dismissal of guilt. The blood she couldn't see then now haunts her constantly." },
    { section:"ACT 5", q:"How does Macbeth meet his end in Act 5?", options:["He is poisoned by Lady Macbeth before the battle","Malcolm kills him in single combat","Macduff kills him, revealing he was born by caesarean section","He falls on his own sword after learning Lady Macbeth has died"], answer:2, explanation:"Macduff reveals he was 'from his mother's womb untimely ripped' — born by C-section. This fulfills the witches' prophecy and strips Macbeth of his false security." }
  ],
  literary: [
    { section:"LITERARY DEVICES", q:"'Fair is foul, and foul is fair.' What literary device is this, and what does it suggest thematically?", options:["Simile — it compares good and evil using 'like' or 'as'","Paradox — it suggests that appearances are deceptive and reality is twisted in this play","Allusion — it references a biblical story about good and evil","Foreshadowing — it predicts that Macbeth will become king"], answer:1, explanation:"This is a paradox — two contradictory ideas presented as true at once. It establishes the play's central theme: appearance vs. reality. Nothing is what it seems in Macbeth's world." },
    { section:"LITERARY DEVICES", q:"In Act 1 Scene 7, Macbeth compares ambition to a horse rider who 'o'erleaps' his saddle and falls. What literary device is this?", options:["Personification","Dramatic Irony","Extended Metaphor / Simile","Allusion"], answer:2, explanation:"This is an extended metaphor/simile comparing unchecked ambition to a rider who jumps too far and falls. It foreshadows Macbeth's own overreach and downfall." },
    { section:"LITERARY DEVICES", q:"The audience knows Macbeth plans to murder Duncan, but Duncan trusts him completely and praises his castle. What literary device does this best illustrate?", options:["Foreshadowing","Dramatic Irony","Equivocation","Pathetic Fallacy"], answer:1, explanation:"Dramatic irony occurs when the audience knows something a character doesn't. Duncan's trust makes his murder more tragic and highlights Macbeth's treacherous deception." },
    { section:"LITERARY DEVICES", q:"The Witches say no man 'of woman born' can harm Macbeth — technically true but deliberately misleading. What device is this?", options:["Paradox","Foreshadowing","Equivocation","Allusion"], answer:2, explanation:"Equivocation is using technically true but misleading language. The prophecy sounds reassuring but is a trap — 'no man of woman born' excludes Macduff, born by C-section." },
    { section:"LITERARY DEVICES", q:"After Duncan's murder in Act 2 Scene 4, horses eat each other and an unnatural darkness covers Scotland. What device is this?", options:["Dramatic Irony","Allusion","Pathetic Fallacy","Hamartia"], answer:2, explanation:"Pathetic fallacy is when nature reflects human events or emotions. The chaos in nature mirrors the moral disorder Macbeth has unleashed on Scotland." },
    { section:"LITERARY DEVICES", q:"Macbeth's hamartia is best described as:", options:["His fear of the supernatural and the witches","His unchecked ambition and susceptibility to manipulation","His inability to trust Lady Macbeth with his plans","His excessive loyalty to King Duncan"], answer:1, explanation:"Hamartia is a tragic hero's fatal flaw. Macbeth's ambition, combined with his vulnerability to Lady Macbeth's manipulation and the witches' prophecies, drives every catastrophic choice." },
    { section:"LITERARY DEVICES", q:"Lady Macbeth says 'A little water clears us of this deed.' Later she can't stop washing her hands in her sleep. What device does this contrast represent?", options:["Simile","Dramatic Irony combined with Foreshadowing","Allusion","Static characterization"], answer:1, explanation:"It's both dramatic irony (we know the guilt won't wash away) and foreshadowing (her confident claim predicts its own undoing). Lady Macbeth's breakdown fulfills what her earlier words denied." },
    { section:"LITERARY DEVICES", q:"Banquo is considered a character foil to Macbeth. What does this mean?", options:["Banquo is Macbeth's closest ally and mirrors his ambitions","Banquo is a villain who works against Macbeth from the start","Banquo contrasts with Macbeth — he also hears prophecy but resists temptation, highlighting Macbeth's moral failure","Banquo is a static character who represents loyalty throughout the play"], answer:2, explanation:"A foil highlights another character's traits through contrast. Banquo hears the same prophecies but chooses not to act corruptly — making Macbeth's choice to murder seem all the more deliberate and damning." }
  ],
  characters: [
    { section:"CHARACTERS", q:"Who says: 'I dreamt last night of the three Weird Sisters. To you they have showed some truth.'", options:["Macbeth","Banquo","Lennox","Ross"], answer:1, explanation:"Banquo says this in Act 2, Scene 1 — showing he remembers the witches' prophecies, but unlike Macbeth, he is cautious rather than driven to act on them." },
    { section:"CHARACTERS", q:"Who says: 'Be bloody, bold, and resolute. Laugh to scorn the power of man, for none of woman born shall harm Macbeth.'", options:["Lady Macbeth","Hecate","The Second Apparition (Bloody Child)","The First Witch"], answer:2, explanation:"This is the Second Apparition in Act 4, Scene 1 — a bloody child symbolizing Macduff. The prophecy gives Macbeth false confidence; Macduff was born by C-section and will kill him." },
    { section:"CHARACTERS", q:"Who says: 'He's here in double trust: First, as I am his kinsman and his subject... then, as his host, who should against his murderer shut the door, not bear the knife myself.'", options:["Banquo","Duncan","Macbeth","Macduff"], answer:2, explanation:"Macbeth says this in his Act 1, Scene 7 soliloquy. It reveals his moral awareness — he KNOWS murdering Duncan is wrong on multiple levels — making his eventual choice all the more tragic." },
    { section:"CHARACTERS", q:"Who says: 'Pray you, keep seat. The fit is momentary; upon a thought he will again be well.'", options:["Lady Macbeth","Lennox","Ross","Malcolm"], answer:0, explanation:"Lady Macbeth says this at the banquet in Act 3, Scene 4 when Macbeth sees Banquo's ghost. She tries to cover for his behavior — showcasing her role as the composed, manipulative partner." },
    { section:"CHARACTERS", q:"Which character says 'What, you egg?' right before being murdered?", options:["Banquo","Lady Macduff's son","Donalbain","Fleance"], answer:1, explanation:"Lady Macduff's young son says this to the murderer in Act 4, Scene 2 — one of the play's most chilling moments. The murder of an innocent child represents Macbeth's complete moral collapse." },
    { section:"CHARACTERS", q:"How does Macduff's characterization make him the story's hero?", options:["Macduff is physically stronger and a better warrior than Macbeth","Macduff is motivated by justice and grief for his country and family, not personal ambition","Macduff was also offered the crown by the witches but refused","Macduff is wealthier and has more political allies than Macbeth"], answer:1, explanation:"Macduff's motivation is love of country and revenge for his murdered family — selfless motives that contrast with Macbeth's purely selfish ambition." },
    { section:"CHARACTERS", q:"How does Lady Macbeth change from Act 1 to Act 5? What type of character arc is this?", options:["She becomes more powerful — static character arc","She goes from dominant and ruthless to guilt-ridden and broken — dynamic character arc","She remains consistently manipulative — static character arc","She gradually becomes more loyal to Macbeth — dynamic character arc"], answer:1, explanation:"Lady Macbeth is a dynamic character. Her confident dismissal of guilt in Act 2 collapses into sleepwalking in Act 5, ending in her suicide." },
    { section:"CHARACTERS", q:"What does Hecate criticize the Three Witches for in Act 3, Scene 5?", options:["For giving Macbeth prophecies that were too vague","For interfering with Macbeth without her permission, and for giving prophecies to a selfish man not devoted to them","For failing to stop Banquo from being murdered","For revealing too much about the future"], answer:1, explanation:"Hecate is angry they acted without her. She plans to create illusions that give Macbeth false confidence — security that will ultimately destroy him." }
  ],
  themes: [
    { section:"THEMES", q:"Which theme is BEST illustrated by Macbeth murdering Duncan, Banquo, and Macduff's family in succession?", options:["Loyalty and betrayal in political relationships","Unchecked ambition leads to a cycle of violence and moral corruption","The supernatural cannot be trusted","Leaders must be ruthless to maintain power"], answer:1, explanation:"Each murder is driven by Macbeth's ambition to secure his power — and each murder creates new threats, requiring more murders. This is Shakespeare's central warning about unchecked ambition." },
    { section:"THEMES", q:"Lady Macbeth's sleepwalking and Macbeth's hallucinations (the dagger, Banquo's ghost) both illustrate which theme?", options:["The supernatural controls human destiny","Guilt is a psychological force that cannot be suppressed indefinitely","Power is always temporary and leads to madness","Appearance and reality are always in conflict"], answer:1, explanation:"Both characters tried to suppress guilt — Lady Macbeth said 'a little water clears us,' Macbeth said he would 'wade' through blood. Their hallucinations show guilt always resurfaces and destroys." },
    { section:"THEMES", q:"Which is a proper theme STATEMENT (not just a topic) about appearance vs. reality in Macbeth?", options:["Macbeth and Lady Macbeth hide their true intentions","Characters in Macbeth frequently lie","Those who deceive others to gain power ultimately cannot escape the truth of their own actions","The witches use disguise to confuse Macbeth"], answer:2, explanation:"A theme STATEMENT is universal and arguable — it makes a claim. The other options are just plot observations or topics, not statements." },
    { section:"THEMES", q:"Malcolm tests Macduff's loyalty by pretending to be evil in Act 4, Scene 3. This best illustrates which theme?", options:["True leaders must be willing to lie for the greater good","Trust must be earned and verified, especially in a world corrupted by treachery","Revenge is the only path to justice","The supernatural causes all of Scotland's problems"], answer:1, explanation:"Malcolm's test is about the destruction of trust that Macbeth's reign caused. In a world where a kinsman murdered his king, even an ally must be verified." },
    { section:"THEMES", q:"Strange natural events after Duncan's murder (horses eating each other, darkness at noon) most directly support which theme?", options:["Nature is inherently violent and chaotic","Murdering a rightful king disrupts the divine order of the universe","The supernatural world is always interfering in human affairs","Scotland has always been a land of violence"], answer:1, explanation:"The 'Great Chain of Being' — the divine order — is central here. Killing a king (God's anointed representative) was a cosmic crime, hence nature itself rebels." }
  ],
  grammar: [
    { section:"SENTENCE TYPES", q:"What is a DEPENDENT clause?", options:["A clause that contains a subject and verb and can stand alone as a complete sentence","A clause with a subject and verb that CANNOT stand alone — it needs an independent clause to complete the thought","Any clause that begins with a coordinating conjunction (FANBOYS)","A clause that has no subject but contains a verb"], answer:1, explanation:"A dependent clause has a subject and verb but is introduced by a subordinating conjunction (after, because, when, while, although) which makes it 'dependent' on an independent clause." },
    { section:"SENTENCE TYPES", q:"Identify the sentence type: 'Tim Cheese, a notorious hitman, bears responsibility for the death of John Pork, a popular vlogger.'", options:["Compound sentence","Complex sentence","Simple sentence","Compound-complex sentence"], answer:2, explanation:"Simple sentence — one independent clause. The appositive phrases ('a notorious hitman,' 'a popular vlogger') add detail but don't create new clauses." },
    { section:"SENTENCE TYPES", q:"In 'After crash-landing on the planet Florpian, Rick stumbled upon a rare energy source when his nephew fell into a pit,' what are the subordinating conjunctions?", options:["after, and","when, and","after, when","crash-landing, fell"], answer:2, explanation:"'After' and 'when' are both subordinating conjunctions — they introduce dependent clauses. This makes the sentence complex (or compound-complex)." },
    { section:"SENTENCE TYPES", q:"What sentence type is: 'The Nintendo Switch 2 boasts enhanced graphics and improved battery life, and while many are eagerly anticipating its release, others are deterred by the price.'", options:["Simple","Compound","Complex","Compound-Complex"], answer:3, explanation:"Compound-complex: two independent clauses joined by 'and' (compound) AND a dependent clause beginning with 'while' (complex). 2+ independent + 1+ dependent = compound-complex." },
    { section:"SENTENCE TYPES", q:"What sentence type is: 'The long-time gamer was shocked and felt out of place while the young teens yelled \"chicken jockey\" during the movie.'", options:["Simple","Compound","Complex","Compound-Complex"], answer:2, explanation:"Complex: one independent clause and one dependent clause beginning with 'while.' Two verbs in the independent clause doesn't make it compound — there's still one subject." },
    { section:"SENTENCE TYPES", q:"Which of the following is a SUBORDINATING conjunction (not a coordinating conjunction)?", options:["but","or","although","yet"], answer:2, explanation:"'Although' is a subordinating conjunction — it begins a dependent clause. 'But,' 'or,' and 'yet' are coordinating conjunctions (FANBOYS: For, And, Nor, But, Or, Yet, So)." }
  ],
  poetic: [
    { section:"POETIC DEVICES", q:"What is a SOLILOQUY?", options:["A remark made by a character to the audience, unheard by other characters","A long speech spoken by a character alone on stage, revealing their inner thoughts","A conversation between two characters in verse form","A poem spoken by the chorus to summarize the plot"], answer:1, explanation:"A soliloquy is when a character speaks their private thoughts aloud while alone on stage. 'Is this a dagger which I see before me?' and 'Tomorrow and tomorrow and tomorrow' are famous examples." },
    { section:"POETIC DEVICES", q:"What is an ASIDE?", options:["A long speech delivered directly to the audience that summarizes the act","A brief comment spoken by a character that other characters on stage cannot hear","A type of monologue spoken by the villain","A stage direction indicating a character should leave the stage"], answer:1, explanation:"An aside is a brief remark to the audience that other characters cannot hear. When Macbeth says 'The greatest is behind' after the Cawdor prophecy, he's speaking aside — hiding his true thoughts." },
    { section:"POETIC DEVICES", q:"What is IAMBIC PENTAMETER?", options:["Lines of poetry with 8 syllables in a trochee pattern","A rhythmic pattern with 10 syllables per line — 5 pairs of unstressed/stressed syllables (da-DUM x5)","A rhyme scheme where every other line rhymes (ABAB)","A meter used only in the Witches' scenes with 4 stressed syllables per line"], answer:1, explanation:"Iambic pentameter: 'penta' = 5, 'iamb' = unstressed/stressed foot. 5 iambs = 10 syllables: da-DUM da-DUM da-DUM da-DUM da-DUM. Most noble characters speak in this meter." },
    { section:"POETIC DEVICES", q:"The Witches speak in TROCHAIC TETRAMETER. How does this differ from iambic pentameter?", options:["It has more syllables and makes the witches sound more educated","It reverses the stress pattern (DUM-da instead of da-DUM) and uses 4 feet — creating a darker, incantatory rhythm that separates the witches from normal characters","It uses rhyming couplets exclusively, making the witches sound playful","It is the same as iambic pentameter but with longer pauses"], answer:1, explanation:"Trochaic tetrameter (DUM-da x4 = 8 syllables) feels inverted and chant-like — 'Double, double, toil and trouble.' The reversed stress marks the witches as supernatural and 'other.'" },
    { section:"POETIC DEVICES", q:"In Act 5, Macbeth says: 'Out, out brief candle! Life's but a walking shadow, a poor player that struts and frets his hour upon the stage.' What device is most prominent?", options:["Allusion to the Bible","Extended metaphor comparing life to theater and a candle flame","Dramatic irony because the audience knows he will die","Personification of death"], answer:1, explanation:"This 'Tomorrow' soliloquy uses extended metaphor — life as a candle, a shadow, and a stage performer. It reveals Macbeth's nihilism after Lady Macbeth's death and his impending doom." },
    { section:"POETIC DEVICES", q:"What is APOSTROPHE as a poetic device?", options:["A punctuation mark used to show possession","When a character directly addresses an absent person, abstract idea, or inanimate object","When a character speaks directly to the audience and breaks the fourth wall","A rhyming pair of lines at the end of a speech or scene"], answer:1, explanation:"Apostrophe addresses something that can't respond. Lady Macbeth's 'Come, you spirits / That tend on mortal thoughts, unsex me here!' is apostrophe — she's calling upon supernatural forces directly." }
  ]
};

let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = [];

function startQuiz(category) {
  if (category === 'all') {
    currentQuestions = Object.values(allQuestions).flat().sort(() => Math.random() - 0.5);
  } else {
    currentQuestions = [...allQuestions[category]].sort(() => Math.random() - 0.5);
  }
  currentIndex = 0; score = 0;
  answered = new Array(currentQuestions.length).fill(null);
  document.getElementById('category-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('results-screen').style.display = 'none';
  renderQuestion();
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;
  document.getElementById('progress-bar').style.width = `${(currentIndex / total) * 100}%`;
  document.getElementById('progress-text').textContent = `QUESTION ${currentIndex + 1} OF ${total}`;
  document.getElementById('section-badge').textContent = q.section;
  document.getElementById('question-num').textContent = `Q${currentIndex + 1}`;
  document.getElementById('question-text').textContent = q.q;
  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  ['A','B','C','D'].forEach((letter, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letter}</span><span>${q.options[i]}</span>`;
    btn.onclick = () => selectAnswer(i);
    optionsEl.appendChild(btn);
  });
  const feedbackEl = document.getElementById('feedback');
  feedbackEl.className = 'feedback';
  feedbackEl.innerHTML = '';
  if (answered[currentIndex] !== null) applyAnswerState(answered[currentIndex]);
  document.getElementById('score-display').textContent = `✦ ${score} CORRECT`;
  document.getElementById('prev-btn').disabled = currentIndex === 0;
  document.getElementById('next-btn').disabled = answered[currentIndex] === null;
}

function selectAnswer(selected) {
  if (answered[currentIndex] !== null) return;
  const q = currentQuestions[currentIndex];
  answered[currentIndex] = selected;
  if (selected === q.answer) score++;
  applyAnswerState(selected);
  document.getElementById('next-btn').disabled = false;
  document.getElementById('score-display').textContent = `✦ ${score} CORRECT`;
}

function applyAnswerState(selected) {
  const q = currentQuestions[currentIndex];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === selected && selected !== q.answer) btn.classList.add('wrong');
    else btn.classList.add('reveal');
  });
  const feedbackEl = document.getElementById('feedback');
  const isCorrect = selected === q.answer;
  feedbackEl.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
  feedbackEl.innerHTML = `<strong>${isCorrect ? '✓ CORRECT' : '✗ INCORRECT'}</strong> — ${q.explanation}`;
}

function navigate(dir) {
  const newIndex = currentIndex + dir;
  if (newIndex < 0) return;
  if (newIndex >= currentQuestions.length) { showResults(); return; }
  currentIndex = newIndex;
  renderQuestion();
}

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';
  const total = currentQuestions.length;
  const pct = Math.round((score / total) * 100);
  document.getElementById('final-score').textContent = `${score} / ${total}`;
  let msg;
  if (pct === 100) msg = '"Stars, hide your fires." Perfect score — you know this play cold.';
  else if (pct >= 80) msg = '"What\'s done cannot be undone." Strong work — review your misses.';
  else if (pct >= 60) msg = '"Come what come may." Decent foundation — keep studying!';
  else msg = '"Yet do I fear thy nature." More review needed — don\'t give up!';
  document.getElementById('results-msg').textContent = msg;
}

function showCategories() {
  document.getElementById('category-screen').style.display = 'block';
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'none';
}
</script>
